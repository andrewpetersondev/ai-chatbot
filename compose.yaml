services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
#      cache_from:
#        - "type=registry,ref=app:build"
#      cache_to:
#        - "type=inline"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - AUTH_SECRET=${AUTH_SECRET}
      - POSTGRES_URL=postgresql://user:password@postgres:5432/myapp
      - REDIS_URL=redis://redis:6379
      - MYSQL_URL=mysql://user:password@mysql:3306/myapp
      - BLOB_READ_WRITE_TOKEN=${BLOB_READ_WRITE_TOKEN}
      - XAI_API_KEY=${XAI_API_KEY}
    volumes:
      - .:/app
#      - /app/node_modules
      - ai-pnpm-store:/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy


  postgres:
    image: postgres:alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=myapp
    volumes:
      - ai-postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d myapp" ]
      interval: 5s
      timeout: 5s
      retries: 5


  mysql:
    image: mysql:alpine
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=myapp
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 20 1 --loglevel warning
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5


  adminer:
    image: adminer:alpine
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy

volumes:
  ai-postgres_data:
  ai-mysql_data:
  ai-redis_data:
  ai-pnpm-store:
